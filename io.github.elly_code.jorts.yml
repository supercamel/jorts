id: io.github.elly_code.jorts
runtime: io.elementary.Platform
runtime-version: '8.2'
sdk: io.elementary.Sdk
command: io.github.elly_code.jorts

finish-args:
  - '--socket=wayland'
  - '--socket=fallback-x11'
  - '--share=ipc'
  - '--device=dri'

cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/vala

modules:
  - name: jorts
    buildsystem: meson
    config-opts:
      - -Dicon-variant=default
    sources:
      - type: dir
        path: .
