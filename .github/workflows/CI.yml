name: CI

on:
  pull_request:
    types:
      - review_requested
      - ready_for_review

jobs:
  flatpak:
    name: Flatpak (${{ matrix.configuration.arch }})
    runs-on: ${{ matrix.configuration.runs-on }}

    strategy:
      matrix:
        configuration:
          - arch: x86_64
            runs-on: ubuntu-latest
          - arch: aarch64
            runs-on: ubuntu-24.04-arm
      fail-fast: true

    container:
      image: ghcr.io/elementary/flatpak-platform/runtime:8.2-${{ matrix.configuration.arch }}
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6.7
        with:
          bundle: Jorts.flatpak
          manifest-path: io.github.elly_code.jorts.yml
          run-tests: true
          repository-name: appcenter
          repository-url: https://flatpak.elementary.io/repo.flatpakrepo
          cache-key: "flatpak-builder-${{ github.sha }}"
          branch: daily
          arch: ${{ matrix.configuration.arch }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    container:
      image: valalang/lint

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint
        run: io.elementary.vala-lint -d .
