name: msys2

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      release:
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.release }}
  cancel-in-progress: true

jobs:
  msys2:
    name: "Windows Builder"
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: windows-latest
            sys: mingw64
            package: x86_64
          - arch: aarch64
            runner: windows-11-arm
            sys: CLANGARM64
            package: clang-aarch64
      fail-fast: true
    runs-on: ${{ matrix.variant.runner }}
    # if: ${{ false }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: 'true'
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.variant.sys }}
          update: true
          install: git make zip wget unzip mingw-w64-${{ matrix.variant.package }}-meson mingw-w64-${{ matrix.variant.package }}-gcc mingw-w64-${{ matrix.variant.package }}-vala mingw-w64-${{ matrix.variant.package }}-desktop-file-utils mingw-w64-${{ matrix.variant.package }}-granite7 mingw-w64-${{ matrix.variant.package }}-gtk-elementary-theme mingw-w64-${{ matrix.variant.package }}-elementary-icon-theme mingw-w64-${{ matrix.variant.package }}-libgee mingw-w64-${{ matrix.variant.package }}-json-glib mingw-w64-x86_64-nsis

      - run: make windows ${{ (inputs.release && 'release=1') || '' }} ${{ (matrix.variant.arch == 'aarch64' && 'msys_sys=clangarm64') || '' }}
      - uses: actions/upload-artifact@v4
        if: matrix.variant.arch == 'x86_64' # let's not break nightly links
        with:
          name: windows_portable
          path: windows_portable/
      - uses: actions/upload-artifact@v4
        if: matrix.variant.arch != 'x86_64'
        with:
          name: windows_portable_${{ matrix.variant.arch }}
          path: windows_portable/
      # NSIS is not available on arm
      - run: make windows_nsis ${{ (inputs.release && 'release=1') || '' }}
        if: matrix.variant.arch == 'x86_64'
      - uses: actions/upload-artifact@v4
        if: matrix.variant.arch == 'x86_64'
        with:
          name: Jorts-Installer.exe
          path: nsis/Jorts-Installer.exe
      - run: sha256sum nsis/Jorts-Installer.exe
        if: matrix.variant.arch == 'x86_64'
