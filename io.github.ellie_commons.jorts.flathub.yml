id: io.github.ellie_commons.jorts
# elementary SDK is not available on Flathub, so use the elementary BaseApp instead
base: io.elementary.BaseApp
base-version: 'circe-25.08'
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: io.github.ellie_commons.jorts

finish-args:
  - '--socket=wayland'
  - '--socket=fallback-x11'
  - '--share=ipc'
  - '--device=dri'

cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/vala

# Cleanup development-related files inherited from the BaseApp to reduce package size of your app.
cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - name: jorts
    buildsystem: meson
    config-opts:
      - -Dprofile=legacy-rdnn
      - -Dicon-variant=pride
      - -Dflathub=true
    sources:
      - type: dir
        path: .
